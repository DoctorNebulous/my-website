<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulation</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="page-simulation">
  <header>
    <h1>Simulation</h1>
    <p>Atlas home world</p>
  </header>
  
  <div id="header-placeholder"></div>

  <main>
    <section>
      <h2>Atlas</h2>
      <ul>
        <li>Stuff</li>
        <li>Atlas experiments</li>
        <li>Homestead planning</li>
      </ul>
    </section>

    <section>
      <h2>Atlas World</h2>

      <canvas id="gameScreen" width="800" height="450"></canvas>

      <div class="game-controls">
        <button id="startSim">Start</button>
        <button id="pauseSim">Pause</button>
        <button id="resetSim">Reset</button>
      </div>

      <p id="simStatus">Atlas is idle</p>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/script.js"></script>
</body>
</html>
